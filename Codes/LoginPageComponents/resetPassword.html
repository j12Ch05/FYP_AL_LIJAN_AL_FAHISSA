<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="ULFS.ico">
</head>
<body>
    <div class="box-container">
        <h1>Reset Password</h1>
        <p>Create a new password for your account</p><br>
        <form id="resetPasswordForm" action="resetPassword.php" method="post">
            <div class="form-group">
                <label for="password">New Password</label>
                <input 
                type="password"
                id="password"
                name="newPassword"
                placeholder="Enter your new password"
                required />
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input 
                type="password"
                id="confirm"
                name="confirmPassword"
                placeholder="Confirm your password"
                required />
            </div>
            <div class="error-message" id="confirmError">The Passwords are not similar</div><br>
            <button type="submit" class="submit-btn" name="changePassword">Change Password</button>
            <div class="back">
                <a href="enterCode.html">Back</a>
            </div>
        </form>
    </div>
</body>
</html>
