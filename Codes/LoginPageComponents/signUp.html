<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="icon" href="ULFS.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box-container">
        <h1>Sign Up</h1>
        <form id="signUpForm" action="php/signUp.php" method="post">
            <div class="form-group">
                <label for="fname">First Name</label>
                <input 
                    type="text"
                    id="fname"
                    name="firstName"
                    placeholder="Enter your first name"
                    maxlength="20"
                    required
                    />
                <div class="error-message" id="fnameError">First name is required</div>
            </div>
            <div class="form-group">
                <label for="lname">Last Name</label>
                <input 
                    type="text"
                    id="lname"
                    name="lastName"
                    placeholder="Enter your last name"
                    maxlength="20"
                    required
                    />
            <div class="error-message" id="lnameError">Last name is required</div>
            </div>
            <div class="form-group">
                <label for="birthDate">Birth Date</label>
                <input type="date" id="birthDate" required />
                <div class="error-message" id="birthDateError">Birth date is required</div>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input 
                    type="text"
                    id="address"
                    name="address"
                    placeholder="Enter your address"
                    maxlength="20"
                    required
                    />
                <div class="error-message" id="addressError">Address is required</div>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input 
                    type="text"
                    id="phone"
                    name="phone"
                    placeholder="xx xxx xxx"
                    maxlength="10"
                    required
                    />
                <div class="error-message" id="phoneError">Please enter a valid phone number</div>
            </div>
            <div class="form-group">
                <label for="filenumber">File Number</label>
                <input 
                    type="text"
                    id="filenumber"
                    name="fileNumber"
                    placeholder="Enter your file number"
                    maxlength="10"
                    required/>
                <div class="error-message" id="filenumber">Please enter a valid file number</div>
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <select class="dropdown-select" name="department" id="department" >
                    <option value="">-- Select your department --</option>
                    <option value="math">Math</option>
                    <option value="css">Computer Science and Statistics</option>
                    <option value="pe">Physics and Electronics</option>
                    <option value="bio">Biology</option>
                    <option value="bioch">Biochemistry</option>
                    <option value="chem">Chemistry</option>
                    <div class="error-message" id="departmentError">Department is required</div>
                </select>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your UL email" 
                    required
                >
                <div class="error-message" id="emailError">Please enter a valid email</div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                >
                <div class="error-message" id="passwordError">Password is required</div>
            </div>
            <button type="submit" class="submit-btn" name="signUp">Sign Up</button>
            <div class="back">
                <a href="login.html">Back to Login</a>
            </div>
        </form>
    </div>
    
</body>
</html>
